<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Integral Cup 2026 — Number Theory</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--sidebar-bg:#0e0e16;--sidebar-w:320px;
  --accent:#7c5cfc;--accent-glow:rgba(124,92,252,.15);
  --text:#c8cdd5;--text-dim:#6b7280;--text-bright:#f0f2f5;
  --border:#1a1a28;--hover:#13131f;--active:#18182a;
  --topic-1:#7c5cfc;--topic-2:#3b82f6;--topic-3:#06b6d4;
  --topic-4:#10b981;--topic-5:#f59e0b;--topic-6:#ef4444;--topic-7:#ec4899;
}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

/* LAYOUT */
.app{display:flex;height:100vh;width:100vw}

/* SIDEBAR */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);height:100vh;
  background:var(--sidebar-bg);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  transition:margin-left .3s cubic-bezier(.4,0,.2,1);z-index:10;
}
.sidebar.collapsed{margin-left:calc(-1 * var(--sidebar-w))}

.sidebar-header{
  padding:20px 20px 16px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.sidebar-header h1{
  font-size:1.1rem;font-weight:700;color:var(--text-bright);
  letter-spacing:-.02em;display:flex;align-items:center;gap:10px;
}
.sidebar-header h1 .icon{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,var(--accent),#a78bfa);
  display:flex;align-items:center;justify-content:center;font-size:.9rem;
}
.sidebar-header p{font-size:.7rem;color:var(--text-dim);margin-top:4px;letter-spacing:.06em;text-transform:uppercase;font-weight:500}

/* SEARCH */
.search-box{padding:12px 16px;flex-shrink:0}
.search-box input{
  width:100%;padding:8px 12px 8px 34px;border-radius:8px;border:1px solid var(--border);
  background:#0a0a12;color:var(--text);font-size:.82rem;font-family:inherit;
  outline:none;transition:border .2s;
}
.search-box input:focus{border-color:var(--accent)}
.search-box{position:relative}
.search-box::before{
  content:"⌕";position:absolute;left:28px;top:50%;transform:translateY(-50%);
  color:var(--text-dim);font-size:.9rem;pointer-events:none;
}

/* NAV TREE */
.nav-tree{flex:1;overflow-y:auto;padding:4px 0 20px;scrollbar-width:thin;scrollbar-color:#222 transparent}
.nav-tree::-webkit-scrollbar{width:4px}
.nav-tree::-webkit-scrollbar-thumb{background:#333;border-radius:4px}

.topic{margin:2px 0}
.topic-btn{
  width:100%;padding:10px 16px 10px 14px;border:none;background:none;
  color:var(--text);font-size:.82rem;font-weight:600;font-family:inherit;
  display:flex;align-items:center;gap:10px;cursor:pointer;text-align:left;
  transition:background .15s,color .15s;position:relative;
}
.topic-btn:hover{background:var(--hover);color:var(--text-bright)}
.topic-btn .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.topic-btn .arrow{
  margin-left:auto;font-size:.6rem;transition:transform .25s;color:var(--text-dim);
}
.topic-btn.open .arrow{transform:rotate(90deg)}

.subtopics{overflow:hidden;max-height:0;transition:max-height .3s ease}
.subtopics.open{max-height:600px}

.sub-btn{
  width:100%;padding:7px 16px 7px 42px;border:none;background:none;
  color:var(--text-dim);font-size:.78rem;font-weight:400;font-family:inherit;
  cursor:pointer;text-align:left;transition:all .15s;display:block;
  position:relative;
}
.sub-btn:hover{background:var(--hover);color:var(--text)}
.sub-btn.active{color:var(--accent);background:var(--accent-glow);font-weight:500}
.sub-btn::before{
  content:"";position:absolute;left:28px;top:0;bottom:0;width:1px;background:var(--border);
}
.sub-btn.active::before{background:var(--accent)}
.sub-btn.practice{font-style:italic;opacity:.85}
.sub-btn.hidden{display:none}

/* MAIN CONTENT */
.main{flex:1;display:flex;flex-direction:column;min-width:0}

.topbar{
  height:48px;flex-shrink:0;border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;background:var(--sidebar-bg);
}
.topbar .toggle-btn{
  width:32px;height:32px;border:1px solid var(--border);border-radius:6px;
  background:none;color:var(--text-dim);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;
  transition:all .15s;
}
.topbar .toggle-btn:hover{background:var(--hover);color:var(--text)}
.breadcrumb{font-size:.78rem;color:var(--text-dim);font-weight:400}
.breadcrumb span{color:var(--text);font-weight:500}

.viewer{flex:1;position:relative;background:var(--bg)}
.viewer iframe{width:100%;height:100%;border:none;background:#0d1117}

/* WELCOME SCREEN */
.welcome{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;gap:16px;
  padding:40px;
}
.welcome.hidden{display:none}
.welcome .logo{
  width:80px;height:80px;border-radius:20px;
  background:linear-gradient(135deg,var(--accent),#a78bfa,#3b82f6);
  display:flex;align-items:center;justify-content:center;font-size:2rem;
  box-shadow:0 0 60px rgba(124,92,252,.2);
}
.welcome h2{font-size:1.6rem;color:var(--text-bright);font-weight:700;letter-spacing:-.02em}
.welcome p{font-size:.9rem;color:var(--text-dim);max-width:400px;line-height:1.6}
.welcome .stats{display:flex;gap:32px;margin-top:8px}
.welcome .stat{text-align:center}
.welcome .stat .num{font-size:1.5rem;font-weight:700;color:var(--accent)}
.welcome .stat .label{font-size:.7rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;height:100vh;box-shadow:4px 0 24px rgba(0,0,0,.5)}
  .sidebar.collapsed{margin-left:calc(-1 * var(--sidebar-w))}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:5}
  .overlay.show{display:block}
}
</style>
</head>
<body>
<div class="app">
  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1><span class="icon">∫</span> Integral Cup 2026</h1>
      <p>Number Theory Curriculum</p>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search topics..." oninput="filterTopics(this.value)">
    </div>
    <div class="nav-tree" id="navTree"></div>
  </nav>

  <div class="main">
    <div class="topbar">
      <button class="toggle-btn" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
      <div class="breadcrumb" id="breadcrumb">Select a topic to begin</div>
    </div>
    <div class="viewer">
      <div class="welcome" id="welcome">
        <div class="logo">∫</div>
        <h2>Number Theory Study Hub</h2>
        <p>Select a topic from the sidebar to begin studying. All modules include rigorous proofs, algorithmic implementations, and practice problems.</p>
        <div class="stats">
          <div class="stat"><div class="num">7</div><div class="label">Topics</div></div>
          <div class="stat"><div class="num">40</div><div class="label">Modules</div></div>
          <div class="stat"><div class="num">90+</div><div class="label">Problems</div></div>
        </div>
      </div>
      <iframe id="contentFrame" style="display:none" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>
  </div>
</div>

<script>
const TOPICS = [
  { name: "Divisibility & Primes", color: "var(--topic-1)", path: "Number Theory/Divisibility and Primes", subs: [
    { name: "Fundamental Theorem of Arithmetic", file: "fundamental.html" },
    { name: "Prime Numbers & Sieves", file: "primes.html" },
    { name: "GCD & Euclidean Algorithm", file: "gcd.html" },
    { name: "Advanced: Prime Distributions", file: "adv-distributions.html" },
    { name: "Practice Questions", file: "practiceques.html", practice: true }
  ]},
  { name: "Congruence & Modular Arithmetic", color: "var(--topic-2)", path: "Number Theory/Congruence and Modular Arithmetic", subs: [
    { name: "Basic Properties & Residue Systems", file: "basicprop-and-reside.html" },
    { name: "Core Theorems (Fermat, Euler, Wilson)", file: "core-thrm.html" },
    { name: "Chinese Remainder Theorem", file: "crt.html" },
    { name: "Polynomial Congruences & Hensel", file: "polynomial-congruence.html" },
    { name: "Advanced Theorems", file: "adv-thrms.html" },
    { name: "Practice Questions", file: "practiceques.html", practice: true }
  ]},
  { name: "Diophantine Equations", color: "var(--topic-3)", path: "Number Theory/Diophantine Eqn", subs: [
    { name: "I: Linear Diophantine Equations", file: "linear.html" },
    { name: "II: Non-Linear & Sums of Squares", file: "non-linear.html" },
    { name: "III: Pell's Equation", file: "pells-eqn.html" },
    { name: "IV: Method of Infinite Descent", file: "infinite-descent.html" },
    { name: "V: Vieta Jumping", file: "Vieta-jump.html" },
    { name: "VI: Exponential Equations & LTE", file: "exponent.html" },
    { name: "VII: Local-Global Principle", file: "adv.html" },
    { name: "Practice Questions", file: "practiceques.html", practice: true }
  ]},
  { name: "Arithmetic Functions", color: "var(--topic-4)", path: "Number Theory/Arithmetic Functions", subs: [
    { name: "A: Key Functions & Asymptotics", file: "algorithmicnt.html" },
    { name: "B: Multiplicativity & Bell Series", file: "multiplicativity.html" },
    { name: "C: Möbius Inversion & Convolution", file: "mobius.html" },
    { name: "D: Advanced Algorithmic Sieves", file: "adv.html" },
    { name: "Practice Questions", file: "practiceques.html", practice: true }
  ]},
  { name: "Quadratic Residues & Reciprocity", color: "var(--topic-5)", path: "Number Theory/Quad reciprocand residue", subs: [
    { name: "A: Quadratic Residues & Euler", file: "basicresidue.html" },
    { name: "B: Legendre Symbol & Gauss's Lemma", file: "quadresidue.html" },
    { name: "C: Law of Quadratic Reciprocity", file: "lawofquad.html" },
    { name: "D: Jacobi & Kronecker Symbols", file: "jacobi.html" },
    { name: "E: Tonelli-Shanks & Cipolla", file: "adv.html" },
    { name: "Practice Questions", file: "practiceques.html", practice: true }
  ]},
  { name: "Primitive Roots & Discrete Log", color: "var(--topic-6)", path: "Number Theory/Primitive Roots and Discrete Log", subs: [
    { name: "A: Order & Carmichael Function", file: "algo-efficiency.html" },
    { name: "B: Primitive Roots", file: "primitive-roots.html" },
    { name: "C: Discrete Logarithms (Indices)", file: "discrete-log.html" },
    { name: "D: BSGS & Pohlig-Hellman", file: "adv.html" },
    { name: "Practice Questions", file: "practiceques.html", practice: true }
  ]},
  { name: "Elliptic Curves & Cryptography", color: "var(--topic-7)", path: "Number Theory/Elliptic Curves", subs: [
    { name: "1: RSA Cryptosystem", file: "rsa-crypto.html" },
    { name: "2: Diffie-Hellman & Cryptanalysis", file: "cryptanalysis.html" },
    { name: "3: Geometry of Elliptic Curves", file: "geometry.html" },
    { name: "4: ECC, Blockchain & Coding Theory", file: "applications.html" },
    { name: "Practice Questions", file: "practiceques.html", practice: true }
  ]}
];

const navTree = document.getElementById("navTree");
const contentFrame = document.getElementById("contentFrame");
const welcome = document.getElementById("welcome");
const breadcrumb = document.getElementById("breadcrumb");
let activeBtn = null;

function buildNav() {
  navTree.innerHTML = "";
  TOPICS.forEach((topic, ti) => {
    const div = document.createElement("div");
    div.className = "topic";
    div.dataset.topic = ti;

    const btn = document.createElement("button");
    btn.className = "topic-btn";
    btn.innerHTML = `<span class="dot" style="background:${topic.color}"></span>${topic.name}<span class="arrow">▶</span>`;
    btn.onclick = () => toggleTopic(ti);
    div.appendChild(btn);

    const subsDiv = document.createElement("div");
    subsDiv.className = "subtopics";
    subsDiv.id = `subs-${ti}`;
    topic.subs.forEach((sub, si) => {
      const sbtn = document.createElement("button");
      sbtn.className = "sub-btn" + (sub.practice ? " practice" : "");
      sbtn.textContent = sub.name;
      sbtn.dataset.path = `${topic.path}/${sub.file}`;
      sbtn.dataset.topic = ti;
      sbtn.dataset.sub = si;
      sbtn.onclick = () => loadContent(sbtn, topic.name, sub.name);
      subsDiv.appendChild(sbtn);
    });
    div.appendChild(subsDiv);
    navTree.appendChild(div);
  });
}

function toggleTopic(i) {
  const btn = navTree.querySelector(`.topic[data-topic="${i}"] .topic-btn`);
  const subs = document.getElementById(`subs-${i}`);
  const isOpen = subs.classList.contains("open");
  if (isOpen) {
    subs.classList.remove("open");
    btn.classList.remove("open");
  } else {
    subs.classList.add("open");
    btn.classList.add("open");
  }
}

function loadContent(btn, topicName, subName) {
  if (activeBtn) activeBtn.classList.remove("active");
  btn.classList.add("active");
  activeBtn = btn;

  welcome.classList.add("hidden");
  contentFrame.style.display = "block";
  contentFrame.src = btn.dataset.path;
  breadcrumb.innerHTML = `${topicName} <span>› ${subName}</span>`;

  if (window.innerWidth < 768) toggleSidebar();
}

function toggleSidebar() {
  const sb = document.getElementById("sidebar");
  const ov = document.getElementById("overlay");
  sb.classList.toggle("collapsed");
  ov.classList.toggle("show");
}

function filterTopics(q) {
  q = q.toLowerCase().trim();
  document.querySelectorAll(".sub-btn").forEach(btn => {
    const match = !q || btn.textContent.toLowerCase().includes(q);
    btn.classList.toggle("hidden", !match);
  });
  TOPICS.forEach((_, i) => {
    const subs = document.getElementById(`subs-${i}`);
    const topicBtn = navTree.querySelector(`.topic[data-topic="${i}"] .topic-btn`);
    const hasVisible = subs.querySelector(".sub-btn:not(.hidden)");
    if (q && hasVisible) {
      subs.classList.add("open");
      topicBtn.classList.add("open");
    }
    navTree.querySelector(`.topic[data-topic="${i}"]`).style.display = hasVisible || !q ? "" : "none";
  });
}

buildNav();
</script>
</body>
</html>
